<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoundStack — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;text-align:center}
    .logo{font-size:28px;margin-bottom:12px}
    h1{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
    .sub{font-size:13px;color:#64748b;margin-bottom:24px}
    .field{margin-bottom:14px;text-align:left}
    .field label{display:block;font-size:11.5px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
    .field input{width:100%;padding:11px 14px;background:#0f172a;border:1.5px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
    .field input:focus{border-color:#c41e3a}
    .field input::placeholder{color:#475569}
    .btn{width:100%;padding:12px;background:#c41e3a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;margin-top:4px}
    .btn:hover{background:#a8172f}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .msg{padding:12px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
    .msg--success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80}
    .msg--error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171}
    .back{margin-top:20px;font-size:13px;color:#475569}
    .back a{color:#fb7185;text-decoration:none}
    .back a:hover{text-decoration:underline}
    #resetForm{display:none}
    #forgotForm{display:block}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🔐</div>
  <h1>Reset Password</h1>

  <!-- FORGOT form (step 1) -->
  <div id="forgotForm">
    <p class="sub">Enter your email and we'll send a reset link</p>
    <div class="msg" id="forgotMsg"></div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="forgotEmail" placeholder="you@example.com" />
    </div>
    <button class="btn" onclick="sendReset()">Send Reset Link</button>
    <div class="back"><a href="/">← Back to BoundStack</a></div>
  </div>

  <!-- RESET form (step 2 — if token in URL) -->
  <div id="resetForm">
    <p class="sub">Choose a new password for your account</p>
    <div class="msg" id="resetMsg"></div>
    <div class="field">
      <label>New Password</label>
      <input type="password" id="newPass" placeholder="Min 6 characters" />
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="confPass" placeholder="Repeat password" />
    </div>
    <button class="btn" id="resetBtn" onclick="doReset()">Update Password</button>
    <div class="back"><a href="/">← Back to sign in</a></div>
  </div>
</div>

<script>
  var token = new URLSearchParams(window.location.search).get('token');
  if (token) {
    document.getElementById('forgotForm').style.display = 'none';
    document.getElementById('resetForm').style.display  = 'block';
  }

  function showMsg(id, msg, type) {
    var el = document.getElementById(id);
    el.className = 'msg msg--' + type;
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function sendReset() {
    var email = document.getElementById('forgotEmail').value.trim();
    if (!email) { showMsg('forgotMsg', 'Please enter your email.', 'error'); return; }
    try {
      var r = await fetch('/api/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
      var d = await r.json();
      if (r.ok) {
        showMsg('forgotMsg', d.message, 'success');
        document.getElementById('forgotEmail').disabled = true;
        document.querySelector('#forgotForm .btn').disabled = true;
      } else { showMsg('forgotMsg', d.error, 'error'); }
    } catch(e) { showMsg('forgotMsg', 'Network error. Try again.', 'error'); }
  }

  async function doReset() {
    var newPass  = document.getElementById('newPass').value;
    var confPass = document.getElementById('confPass').value;
    if (!newPass || newPass.length < 6) { showMsg('resetMsg', 'Password must be at least 6 characters.', 'error'); return; }
    if (newPass !== confPass)           { showMsg('resetMsg', 'Passwords do not match.', 'error'); return; }
    document.getElementById('resetBtn').disabled = true;
    try {
      var r = await fetch('/api/reset-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password: newPass }) });
      var d = await r.json();
      if (r.ok) {
        showMsg('resetMsg', d.message + ' Redirecting...', 'success');
        setTimeout(function(){ window.location.href = '/'; }, 2000);
      } else {
        showMsg('resetMsg', d.error, 'error');
        document.getElementById('resetBtn').disabled = false;
      }
    } catch(e) { showMsg('resetMsg', 'Network error. Try again.', 'error'); document.getElementById('resetBtn').disabled = false; }
  }

  document.addEventListener('keydown', function(e) { if (e.key === 'Enter') token ? doReset() : sendReset(); });
</script>
</body>
</html>

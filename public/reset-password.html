<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoundStack — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: #06080F;
      color: #E8EFF8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    :root {
      --copper: #C8641A; --copper-h: #E8762A;
      --steel: #0D1220; --gun: #141C2E; --mist: #2A3A52;
      --ice: #E8EFF8; --fog: #7A8BA0;
    }

    .card {
      background: var(--steel);
      border: 1px solid var(--mist);
      border-radius: 16px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--copper), #8B3A0A);
      border-radius: 12px;
      margin-bottom: 18px;
      box-shadow: 0 0 24px rgba(200,100,26,.4);
    }

    .logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: .14em;
      color: var(--fog);
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: .04em;
      color: var(--ice);
      margin-bottom: 8px;
    }

    .sub {
      font-size: 14px;
      color: var(--fog);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: var(--mist);
      margin: 0 0 24px;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 18px;
      display: none;
      text-align: left;
    }
    .msg--success { background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.25); color: #4ade80; }
    .msg--error   { background: rgba(239,68,68,.08);  border: 1px solid rgba(239,68,68,.25);  color: #f87171; }

    .field { margin-bottom: 16px; text-align: left; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--fog);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      padding: 12px 16px;
      background: #06080F;
      border: 1.5px solid var(--mist);
      border-radius: 8px;
      color: var(--ice);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color: var(--copper);
      box-shadow: 0 0 0 3px rgba(200,100,26,.15);
    }
    .field input::placeholder { color: #3A4A60; }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--copper);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: .04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-top: 6px;
    }
    .btn:hover   { background: var(--copper-h); transform: translateY(-1px); }
    .btn:active  { transform: translateY(0); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .back {
      margin-top: 22px;
      font-size: 13px;
      color: var(--fog);
    }
    .back a {
      color: var(--copper);
      text-decoration: none;
      font-weight: 600;
      transition: color .2s;
    }
    .back a:hover { color: var(--copper-h); }

    #resetForm  { display: none; }
    #forgotForm { display: block; }

    @media (max-width: 480px) {
      .card { padding: 32px 22px; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
      <path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.32C17.25 22.15 21 17.25 21 12V6L12 2z" fill="#fff" opacity=".92"/>
      <path d="M8.5 12.5l2.5 2.5 4.5-4.5" stroke="#C8641A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="logo-name">BoundStack</div>

  <!-- FORGOT form (step 1) -->
  <div id="forgotForm">
    <h1>Reset Password</h1>
    <p class="sub">Enter your email and we'll send you a secure reset link.</p>
    <div class="divider"></div>
    <div class="msg" id="forgotMsg"></div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="forgotEmail" placeholder="you@yourshop.com" autocomplete="email" />
    </div>
    <button class="btn" onclick="sendReset()">Send Reset Link</button>
    <div class="back"><a href="/">← Back to BoundStack</a></div>
  </div>

  <!-- RESET form (step 2 — token in URL) -->
  <div id="resetForm">
    <h1>New Password</h1>
    <p class="sub">Choose a strong password for your BoundStack account.</p>
    <div class="divider"></div>
    <div class="msg" id="resetMsg"></div>
    <div class="field">
      <label>New Password</label>
      <input type="password" id="newPass" placeholder="Minimum 6 characters" autocomplete="new-password" />
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="confPass" placeholder="Repeat your password" autocomplete="new-password" />
    </div>
    <button class="btn" id="resetBtn" onclick="doReset()">Update Password</button>
    <div class="back"><a href="/">← Back to sign in</a></div>
  </div>

</div>

<script>
  var token = new URLSearchParams(window.location.search).get('token');
  if (token) {
    document.getElementById('forgotForm').style.display = 'none';
    document.getElementById('resetForm').style.display  = 'block';
  }

  function showMsg(id, msg, type) {
    var el = document.getElementById(id);
    el.className = 'msg msg--' + type;
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function sendReset() {
    var email = document.getElementById('forgotEmail').value.trim();
    if (!email) { showMsg('forgotMsg', 'Please enter your email address.', 'error'); return; }
    var btn = document.querySelector('#forgotForm .btn');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    try {
      var r = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      var d = await r.json();
      if (r.ok) {
        showMsg('forgotMsg', d.message || 'Reset link sent! Check your inbox.', 'success');
        document.getElementById('forgotEmail').disabled = true;
        btn.textContent = 'Email Sent ✓';
      } else {
        showMsg('forgotMsg', d.error || 'Something went wrong. Try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    } catch(e) {
      showMsg('forgotMsg', 'Network error. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    }
  }

  async function doReset() {
    var newPass  = document.getElementById('newPass').value;
    var confPass = document.getElementById('confPass').value;
    if (!newPass || newPass.length < 6) { showMsg('resetMsg', 'Password must be at least 6 characters.', 'error'); return; }
    if (newPass !== confPass)           { showMsg('resetMsg', 'Passwords do not match.', 'error'); return; }
    var btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.textContent = 'Updating…';
    try {
      var r = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, password: newPass })
      });
      var d = await r.json();
      if (r.ok) {
        showMsg('resetMsg', (d.message || 'Password updated!') + ' Redirecting…', 'success');
        btn.textContent = 'Done ✓';
        setTimeout(function(){ window.location.href = '/'; }, 2000);
      } else {
        showMsg('resetMsg', d.error || 'Something went wrong.', 'error');
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    } catch(e) {
      showMsg('resetMsg', 'Network error. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Update Password';
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') token ? doReset() : sendReset();
  });
</script>
</body>
</html>
